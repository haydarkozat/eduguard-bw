name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Byte-compile (py_compile)
        run: python -m compileall -q backend

      - name: Lint (ruff — error-level rules only)
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # Fail only on real errors: syntax, undefined names, etc.
          ruff check backend --select E9,F63,F7,F82

      - name: Install dependencies (resolution sanity)
        run: pip install -r backend/requirements.txt

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
